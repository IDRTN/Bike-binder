name: Build & Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Get version
        run: |
          echo "VERSION=v$(node -p "require('./app.json').expo.version")" >> $GITHUB_ENV
          echo "TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Bike Binder ${{ env.VERSION }}
          body: |
            Latest build of Bike Binder.
            
            **Fixes in this release:**
            - Ride tracker now calculates speed from GPS position changes (fixes incorrect mileage)
            - PDF manuals open with your device's PDF viewer
            - Parts section now includes Miles, Price, Make, Model, Specs, Notes fields
            - Updated app icon
          files: android/app/build/outputs/apk/debug/*.apk
          fail_on_unmatched_files: false
