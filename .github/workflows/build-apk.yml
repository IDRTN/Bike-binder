name: Build & Release APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bike-binder-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Get version from app.json
        run: echo "VERSION=$(node -p "require('./app.json').expo.version")" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Bike Binder v${{ env.VERSION }}
          body: |
            Latest APK build for Bike Binder.
            
            Download the APK below and install on your Android device.
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
