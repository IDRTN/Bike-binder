name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode release keystore (if available)
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
            echo "Keystore decoded"
          else
            echo "No keystore secret set — skipping release signing"
          fi

      - name: Prebuild native project
        run: npx expo prebuild --platform android --clean

      - name: Accept SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1

      - name: Build debug APK (unsigned)
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release APK (signed)
        working-directory: ./android
        run: |
          if [ -f release.keystore ]; then
            ./gradlew assembleRelease --no-daemon \
              -PANDROID_KEYSTORE_FILE=release.keystore \
              -PANDROID_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
              -PANDROID_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }} \
              -PANDROID_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          else
            echo "Skipping release build (no keystore)"
          fi

      - name: Get version
        run: |
          echo "VERSION=v$(node -p "require('./app.json').expo.version")" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Bike Binder ${{ env.VERSION }}
          body: |
            Latest build of Bike Binder.
          files: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
